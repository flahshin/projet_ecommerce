services:
  product-service:
    build: ./product-service
    ports:
      - "8000:8000"
    environment:
      - ENV=development
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  order-service:
    build: ./order-service
    ports:
      - "8001:8001"
    environment:
      - PRODUCT_SERVICE_URL=http://product-service:8000
    depends_on:
      product-service:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - product-service
      - order-service